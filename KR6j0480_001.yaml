body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯如是我聞一時薄伽梵在安樂世界爾時觀自在菩薩來詣佛所頭面禮佛足退坐一面爾時大吉祥天女菩薩摩訶薩亦往佛所稽首佛足退坐一面爾時世尊為欲利益薄福貧窮諸有情故見吉祥天女告觀自在菩薩言若有苾芻苾芻尼近事男近事女及彼一切有情之類知此大吉祥天女十二名號受持讀誦修習供養為他宣說能除一切貧窮業障獲得豐饒財寶富貴爾時會中一切天龍八部異口同音咸作是言世尊所說真實不虛我等願聞十二名號唯願世尊大悲演說佛言汝當善聽今為汝說所謂吉慶吉祥蓮華嚴飾具財白色大名稱大光曜施食者施飲者寶光大吉是十二名號汝當受持我今復說是吉祥言曰怛儞也二合他室哩二合抳室哩二合抳二薩嚩迦哩野娑馱𩕳悉𩕳悉𩕳𩕳𩕳𩕳𩕳阿落乞史茗曩捨野娑嚩二合引訶爾時世尊說是陀羅尼已告觀自在菩薩言此大吉祥陀羅尼及十二名號能除貧窮一切不祥所有願求皆得圓滿若能晝夜三時讀誦此經每時三遍或常受持不間作饒益心隨力虔誠供養大吉祥天女菩薩速獲一切財寶豐樂吉祥時觀自在菩薩及諸大眾天龍八部從佛聞說十二名號及真言歎未曾有皆大歡喜信受奉行
